services:
  postgres:
    image: postgres:16
    container_name: workspace-mvp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workspace_mvp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - codex-shared

volumes:
  pgdata:

networks:
  codex-shared:
    name: workspace-mvp-network
