<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace Capture</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 12px;
        width: 300px;
        color: #111827;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      h2 {
        margin: 14px 0 8px;
        font-size: 14px;
      }
      p {
        font-size: 12px;
        margin: 6px 0;
      }
      label {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 6px;
        font-size: 12px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px;
        border: 0;
        border-radius: 4px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        cursor: progress;
        opacity: 0.75;
      }
      #status {
        min-height: 16px;
      }
      .workspace-panel {
        margin-top: 16px;
        border-top: 1px solid #e5e7eb;
        padding-top: 12px;
      }
      #workspace-name {
        font-weight: 600;
      }
      #workspace-images {
        margin-top: 8px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      #workspace-images img {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid #e5e7eb;
      }
      .workspace-images-empty {
        margin: 0;
        grid-column: 1 / -1;
        color: #6b7280;
      }
      #workspace-images-summary {
        color: #374151;
      }
    </style>
  </head>
  <body>
    <h1>Save image to workspace</h1>
    <p>1) Set workspace ID. 2) Right-click any image. 3) Choose “Save image to workspace”.</p>

    <form id="settings-form">
      <label for="workspace-id">Workspace ID</label>
      <input id="workspace-id" name="workspace-id" type="text" placeholder="cma123..." required />

      <label for="api-base-url">API Base URL</label>
      <input id="api-base-url" name="api-base-url" type="url" placeholder="http://localhost:3000" />

      <button type="submit">Save settings</button>
    </form>

    <section class="workspace-panel" aria-live="polite">
      <h2>Current workspace</h2>
      <p id="workspace-name">Set a workspace ID to load details.</p>
      <button id="refresh-workspace" type="button">Refresh workspace</button>
      <p id="workspace-images-summary">0 images from workspace items</p>
      <div id="workspace-images"></div>
    </section>

    <p id="status"></p>

    <script src="src/popup.js" type="module"></script>
  </body>
</html>
