<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace Capture</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 12px;
        width: 360px;
        color: #111827;
        background: #f8fafc;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      h2 {
        margin: 14px 0 8px;
        font-size: 14px;
      }
      p {
        font-size: 12px;
        margin: 6px 0;
      }
      label {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        font-weight: 600;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 6px;
        font-size: 12px;
      }
      select {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 6px;
        font-size: 12px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        padding: 8px;
        border: 0;
        border-radius: 4px;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        cursor: progress;
        opacity: 0.75;
      }
      #status {
        min-height: 16px;
      }
      .form-row {
        display: flex;
        gap: 8px;
        align-items: end;
      }
      .form-row > * {
        flex: 1;
      }
      .form-row button {
        flex: 0 0 auto;
        width: auto;
        min-width: 118px;
      }
      .workspace-panel {
        margin-top: 16px;
        border-top: 1px solid #e5e7eb;
        padding-top: 12px;
      }
      #workspace-name {
        font-weight: 600;
      }
      #workspace-id-caption {
        margin-top: 2px;
        color: #64748b;
        word-break: break-all;
      }
      .panel-actions {
        display: flex;
        gap: 8px;
      }
      .panel-actions button {
        margin-top: 0;
      }
      #delete-workspace {
        background: #dc2626;
      }
      .workspace-picker-row {
        display: flex;
        gap: 8px;
        align-items: end;
      }
      .workspace-picker-row > label {
        flex: 1;
        margin-top: 0;
      }
      .workspace-picker-row > button {
        width: auto;
        min-width: 96px;
      }
      #workspace-items,
      #workspace-renders {
        margin-top: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .item-card,
      .render-card {
        background: #ffffff;
        border: 1px solid #dbe4ee;
        border-radius: 8px;
        padding: 8px;
      }
      .item-card {
        display: grid;
        grid-template-columns: auto 72px 1fr;
        gap: 8px;
        align-items: start;
        margin-top: 0;
        font-weight: 400;
      }
      .render-used-item {
        display: grid;
        grid-template-columns: 72px 1fr;
        gap: 8px;
        align-items: start;
        border: 1px solid #dbe4ee;
        border-radius: 8px;
        padding: 8px;
        background: #ffffff;
      }
      .item-card input {
        width: auto;
        margin: 4px 0 0;
      }
      .item-card-preview img,
      .render-card-image {
        width: 100%;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        border-radius: 4px;
        border: 1px solid #e5e7eb;
      }
      .item-card-placeholder {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 4px;
        border: 1px dashed #cbd5e1;
        background: #f8fafc;
        color: #64748b;
        font-size: 11px;
      }
      .item-card-title,
      .render-card-title {
        margin: 0;
        font-weight: 600;
      }
      .item-card-title {
        display: inline-block;
        color: #0f172a;
        text-decoration: none;
      }
      .item-card-title:hover {
        text-decoration: underline;
      }
      .item-card-meta,
      .item-card-status,
      .render-card-meta,
      .render-card-error {
        margin: 4px 0 0;
        color: #475569;
      }
      .item-card-delete {
        margin-top: 8px;
        width: auto;
        padding: 6px 10px;
        background: #dc2626;
      }
      .item-card-status.is-ready {
        color: #166534;
      }
      .item-card-status.is-blocked,
      .render-card-error {
        color: #b91c1c;
      }
      .render-controls {
        margin-top: 10px;
        padding: 10px;
        border: 1px solid #dbe4ee;
        border-radius: 8px;
        background: #ffffff;
      }
      .render-used-items {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 8px;
      }
      .render-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .render-status {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 11px;
        font-weight: 600;
        text-transform: capitalize;
      }
      .render-status.is-queued {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .render-status.is-processing {
        background: #fef3c7;
        color: #92400e;
      }
      .render-status.is-complete {
        background: #dcfce7;
        color: #166534;
      }
      .render-status.is-failed {
        background: #fee2e2;
        color: #b91c1c;
      }
      .empty-state {
        margin: 0;
        color: #6b7280;
      }
      .vote-controls {
        display: flex;
        gap: 6px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .vote-button {
        margin-top: 0;
        width: auto;
        min-width: 68px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: #ffffff;
        color: #0f172a;
        text-transform: capitalize;
      }
      .vote-button[data-selected='true'] {
        border-color: transparent;
        background: #0f766e;
        color: #ffffff;
      }
      #workspace-items-summary,
      #workspace-renders-summary {
        color: #374151;
      }
      .workspace-create-form {
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Workspace Stylist</h1>
    <p>Choose an active workspace, create one if needed, then save clothing images and request renders.</p>

    <form id="settings-form">
      <div class="form-row">
        <label for="api-base-url">
          API Base URL
          <input id="api-base-url" name="api-base-url" type="url" placeholder="http://localhost:4000" />
        </label>
        <button type="submit">Save API URL</button>
      </div>
    </form>

    <section class="workspace-panel" aria-live="polite">
      <h2>Workspace</h2>
      <div class="workspace-picker-row">
        <label for="workspace-picker">
          Active workspace
          <select id="workspace-picker" name="workspace-picker">
            <option value="">Loading workspaces…</option>
          </select>
        </label>
        <button id="refresh-workspace-list" type="button">Refresh list</button>
      </div>

      <form id="create-workspace-form" class="workspace-create-form">
        <div class="form-row">
          <label for="new-workspace-title">
            New workspace title
            <input id="new-workspace-title" name="new-workspace-title" type="text" placeholder="Spring looks" />
          </label>
          <button id="create-workspace-button" type="submit">Create workspace</button>
        </div>
      </form>
    </section>

    <section class="workspace-panel" aria-live="polite">
      <h2>Current workspace</h2>
      <p id="workspace-name">No workspace selected</p>
      <p id="workspace-id-caption">Choose a workspace above to make it active.</p>
      <div class="panel-actions">
        <button id="refresh-workspace" type="button">Refresh workspace</button>
        <button id="delete-workspace" type="button">Delete workspace</button>
      </div>
      <p id="workspace-items-summary">0 render-ready items out of 0</p>
      <div id="workspace-items"></div>

      <div class="render-controls">
        <label for="render-mode">Render mode</label>
        <select id="render-mode" name="render-mode">
          <option value="preview" selected>Preview</option>
          <option value="high_quality">High quality</option>
        </select>
        <button id="submit-render" type="button">Create render</button>
      </div>
    </section>

    <section class="workspace-panel" aria-live="polite">
      <h2>Renders</h2>
      <div class="panel-actions">
        <button id="refresh-renders" type="button">Refresh renders</button>
      </div>
      <p id="workspace-renders-summary">0 renders in this workspace</p>
      <div id="workspace-renders"></div>
    </section>

    <p id="status"></p>

    <script src="dist/popup.js" type="module"></script>
  </body>
</html>
