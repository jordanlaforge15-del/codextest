<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace Render MVP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Task 9</p>
        <h1>AI Render Workspace</h1>
        <p class="lede">
          Select saved items, queue a render job, and watch the OpenAI-powered preview complete.
        </p>
      </section>

      <section class="panel controls">
        <label>
          Workspace
          <select id="workspace-select"></select>
        </label>
        <label>
          Render mode
          <select id="render-mode">
            <option value="preview">Preview</option>
            <option value="high_quality">High Quality</option>
          </select>
        </label>
        <div class="actions">
          <button id="refresh-button" type="button">Refresh</button>
          <button id="create-render-button" type="button">Create Render</button>
        </div>
        <p id="status-message" class="status-message"></p>
      </section>

      <section class="layout">
        <section class="panel">
          <div class="panel-header">
            <h2>Items</h2>
            <p>Select the pieces to include in the render.</p>
          </div>
          <div id="workspace-meta" class="workspace-meta"></div>
          <div id="items-grid" class="items-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Render Jobs</h2>
            <p>Queued jobs should progress to processing and then complete or fail.</p>
          </div>
          <div id="renders-list" class="renders-list"></div>
        </section>
      </section>
    </main>

    <script src="/config.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
